<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sorte a Dois</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body onload="loadData()">
    <main class="container">
        <section class="hero">
            <div class="heart">❤️</div>
            <h1>Sorte a Dois</h1>
            <p>Ideias, momentos e aventuras para Amanda e Naubert.</p>
        </section>

        <section class="card">
            <h2>Dashboard</h2>
            <div id="statsBox" class="stats-grid"></div>
        </section>

        <section class="card">
            <h2>Login</h2>
            <input id="loginEmail" placeholder="E-mail">
            <input id="loginPassword" type="password" placeholder="Senha">
            <button onclick="login()">Entrar</button>
            <p id="loginResult"></p>
        </section>

        <section class="card">
            <h2>Usuários</h2>

            <h3>Criar usuário</h3>
            <input id="userName" placeholder="Nome">
            <input id="userEmail" placeholder="E-mail">
            <input id="userPassword" type="password" placeholder="Senha">
            <button onclick="createUser()">Criar usuário</button>
            <p id="userResult"></p>

            <hr>

            <h3>Editar usuário</h3>
            <label>Usuário</label>
            <select id="editUserId" onchange="fillEditUserFields()"></select>
            <input id="editUserName" placeholder="Novo nome">
            <input id="editUserEmail" placeholder="Novo e-mail">
            <input id="editUserPassword" type="password" placeholder="Nova senha">
            <button onclick="updateUser()">Salvar alterações</button>
            <p id="editUserResult"></p>
        </section>

        <section class="card">
            <h2>Casal</h2>
            <input id="coupleName" placeholder="Nome do casal. Ex: Amanda e Naubert">
            <button onclick="createCouple()">Criar casal</button>
            <p id="coupleResult"></p>
        </section>

        <section class="card">
            <h2>Sorteios</h2>

            <h3>Criar sorteio</h3>
            <label>Casal</label>
            <select id="raffleCoupleId" onchange="loadStats()"></select>

            <label>Quem está criando?</label>
            <select id="raffleUserId"></select>

            <input id="raffleName" placeholder="Nome do sorteio. Ex: Restaurantes">
            <input id="raffleDescription" placeholder="Descrição">
            <button onclick="createRaffle()">Criar sorteio</button>
            <p id="raffleResult"></p>

            <hr>

            <h3>Editar sorteio</h3>
            <label>Sorteio</label>
            <select id="editRaffleId" onchange="fillEditRaffleFields(); loadItemsPanel();"></select>

            <input id="editRaffleName" placeholder="Nome do sorteio">
            <input id="editRaffleDescription" placeholder="Descrição">

            <label>
                <input type="checkbox" id="editRaffleAllowRepeat">
                Permitir repetir itens sorteados
            </label>

            <button onclick="updateRaffle()">Salvar sorteio</button>
            <button class="danger" onclick="deleteRaffle()">Excluir sorteio</button>
            <p id="editRaffleResult"></p>
        </section>

        <section class="card">
            <h2>Itens do sorteio</h2>

            <label>Sorteio</label>
            <select id="itemRaffleId" onchange="loadItemsPanel()"></select>

            <label>Quem está adicionando?</label>
            <select id="itemUserId"></select>

            <input id="itemTitle" placeholder="Ideia. Ex: Ir ao Outback">
            <textarea id="itemDescription" placeholder="Descrição opcional"></textarea>

            <button onclick="createItem()">Adicionar item</button>
            <p id="itemResult"></p>

            <hr>

            <div id="itemsList"></div>
        </section>

        <section class="card highlight">
            <h2>Sortear</h2>

            <label>Sorteio</label>
            <select id="drawRaffleId" onchange="loadItemsPanel()"></select>

            <label>Quem está sorteando?</label>
            <select id="drawUserId"></select>

            <button class="draw-button" onclick="drawItem()">🎲 Sortear agora</button>
            <div id="drawResult" class="result-box"></div>
        </section>

        <section class="card">
            <h2>Resetar sorteio</h2>

            <label>Sorteio</label>
            <select id="resetRaffleId"></select>

            <button onclick="resetDraw()">Resetar</button>
            <p id="resetResult"></p>
        </section>

        <section class="card">
            <h2>Pontuação</h2>

            <label>Casal</label>
            <select id="pointsCoupleId"></select>

            <button onclick="loadPoints()">Ver pontuação</button>

            <div id="pointsBox" class="result-box"></div>
        </section>

        <section class="card">
            <h2>Conquistas</h2>

            <label>Casal</label>
            <select id="achievementsCoupleId"></select>

            <button onclick="loadAchievements()">Ver conquistas</button>

            <div id="achievementsBox"></div>
        </section>

        <section class="card">
            <h2>Memórias</h2>

            <label>Casal</label>
            <select id="memoryCoupleId"></select>

            <label>Quem está criando?</label>
            <select id="memoryUserId"></select>

            <input id="memoryTitle" placeholder="Título da memória">
            <textarea id="memoryDescription" placeholder="Descrição"></textarea>

            <input id="memoryPhotoUrl" placeholder="Link da foto ou URL gerada pelo upload">
            <input id="memoryPhotoFile" type="file" accept="image/*">
            <button onclick="uploadMemoryPhoto()">Enviar foto</button>
            <p id="uploadResult"></p>

            <input id="memoryPlaceName" placeholder="Nome do lugar">
            <input id="memoryLatitude" placeholder="Latitude">
            <input id="memoryLongitude" placeholder="Longitude">
            <input id="memoryRating" placeholder="Nota de 1 a 5">

            <button onclick="createMemory()">Salvar memória</button>
            <p id="memoryResult"></p>

            <hr>

            <button onclick="loadMemories()">Carregar memórias</button>
            <div id="memoriesBox"></div>
        </section>

        <section class="card">
            <h2>Histórico de sorteios</h2>

            <label>Casal</label>
            <select id="historyCoupleId"></select>

            <button onclick="loadHistory()">Ver histórico</button>

            <div id="historyBox"></div>
        </section>
    </main>

    <script>
        let cachedUsers = [];
        let cachedCouples = [];
        let cachedRaffles = [];
        let cachedItems = [];
        let uploadedMemoryPhotoUrl = "";
        let loggedUser = null;

        async function loadData() {
            await loadUsers();
            await loadCouples();
            await loadRaffles();
            await loadItemsPanel();
            await loadStats();
        }

        function fillSelect(selectId, items, labelFunction) {
            const select = document.getElementById(selectId);
            if (!select) return;

            select.innerHTML = "";

            if (!items.length) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "Nenhum registro encontrado";
                select.appendChild(option);
                return;
            }

            items.forEach(item => {
                const option = document.createElement("option");
                option.value = item.id;
                option.textContent = labelFunction(item);
                select.appendChild(option);
            });
        }

        async function loadUsers() {
            const response = await fetch('/users/');
            const users = await response.json();
            cachedUsers = users;

            fillSelect("raffleUserId", users, user => `${user.name} (${user.email})`);
            fillSelect("itemUserId", users, user => `${user.name} (${user.email})`);
            fillSelect("drawUserId", users, user => `${user.name} (${user.email})`);
            fillSelect("editUserId", users, user => `${user.name} (${user.email})`);
            fillSelect("memoryUserId", users, user => `${user.name} (${user.email})`);

            fillEditUserFields();
        }

        async function loadCouples() {
            const response = await fetch('/couples/');
            const couples = await response.json();
            cachedCouples = couples;

            fillSelect("raffleCoupleId", couples, couple => couple.name);
            fillSelect("pointsCoupleId", couples, couple => couple.name);
            fillSelect("achievementsCoupleId", couples, couple => couple.name);
            fillSelect("memoryCoupleId", couples, couple => couple.name);
            fillSelect("historyCoupleId", couples, couple => couple.name);
        }

        async function loadRaffles() {
            const response = await fetch('/raffles/');
            const raffles = await response.json();
            cachedRaffles = raffles;

            fillSelect("itemRaffleId", raffles, raffle => raffle.name);
            fillSelect("drawRaffleId", raffles, raffle => raffle.name);
            fillSelect("resetRaffleId", raffles, raffle => raffle.name);
            fillSelect("editRaffleId", raffles, raffle => raffle.name);

            fillEditRaffleFields();
        }

        async function loadStats() {
            const coupleId = document.getElementById("raffleCoupleId")?.value;

            if (!coupleId) {
                document.getElementById("statsBox").innerHTML = "<p>Crie ou selecione um casal para ver as estatísticas.</p>";
                return;
            }

            const response = await fetch(`/stats/couple/${coupleId}`);
            const stats = await response.json();

            document.getElementById("statsBox").innerHTML = `
                <div><strong>${stats.total_raffles}</strong><span>Sorteios</span></div>
                <div><strong>${stats.total_items}</strong><span>Itens</span></div>
                <div><strong>${stats.total_drawn_items}</strong><span>Sorteados</span></div>
                <div><strong>${stats.total_completed_items}</strong><span>Concluídos</span></div>
                <div><strong>${stats.completion_percentage}%</strong><span>Conclusão</span></div>
            `;
        }

        function fillEditUserFields() {
            const userId = Number(document.getElementById("editUserId")?.value);
            const user = cachedUsers.find(u => u.id === userId);

            if (!user) return;

            document.getElementById("editUserName").value = user.name;
            document.getElementById("editUserEmail").value = user.email;
            document.getElementById("editUserPassword").value = "";
        }

        function fillEditRaffleFields() {
            const raffleId = Number(document.getElementById("editRaffleId")?.value);
            const raffle = cachedRaffles.find(r => r.id === raffleId);

            if (!raffle) return;

            document.getElementById("editRaffleName").value = raffle.name;
            document.getElementById("editRaffleDescription").value = raffle.description || "";
            document.getElementById("editRaffleAllowRepeat").checked = raffle.allow_repeat;
        }

        async function loadItemsPanel() {
            const raffleId =
                document.getElementById("itemRaffleId")?.value ||
                document.getElementById("drawRaffleId")?.value ||
                document.getElementById("editRaffleId")?.value;

            const list = document.getElementById("itemsList");

            if (!raffleId || !list) {
                if (list) list.innerHTML = "<p>Selecione um sorteio para ver os itens.</p>";
                return;
            }

            const response = await fetch(`/items/raffle/${raffleId}`);
            const items = await response.json();
            cachedItems = items;

            if (!items.length) {
                list.innerHTML = "<p>Nenhum item cadastrado neste sorteio ainda.</p>";
                return;
            }

            list.innerHTML = items.map(item => `
                <div class="item-card ${item.is_drawn ? 'drawn' : ''} ${item.is_completed ? 'completed' : ''}">
                    <strong>${item.title}</strong>
                    <p>${item.description || ""}</p>
                    <small>
                        ${item.is_drawn ? "🎲 Já sorteado" : "Disponível"}
                        ${item.is_completed ? " | ✅ Concluído" : ""}
                        ${item.rating ? ` | ⭐ Nota: ${item.rating}` : ""}
                    </small>

                    ${item.comment ? `<p><em>${item.comment}</em></p>` : ""}

                    <input id="title-${item.id}" value="${item.title}">
                    <textarea id="desc-${item.id}">${item.description || ""}</textarea>

                    <div class="button-row">
                        <button onclick="updateItem(${item.id})">Salvar</button>
                        <button onclick="completeItem(${item.id})">Concluir</button>
                        <button onclick="undoCompleteItem(${item.id})">Desfazer conclusão</button>
                        <button class="danger" onclick="deleteItem(${item.id})">Excluir</button>
                    </div>
                </div>
            `).join("");
        }

        async function login() {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                })
            });

            const data = await response.json();

            if (response.ok) {
                loggedUser = data;
                localStorage.setItem("loggedUser", JSON.stringify(data));
                document.getElementById('loginResult').innerText = `Bem-vindo(a), ${data.name}!`;
            } else {
                document.getElementById('loginResult').innerText = data.detail || JSON.stringify(data);
            }
        }

        async function createUser() {
            const response = await fetch('/users/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('userName').value,
                    email: document.getElementById('userEmail').value,
                    password: document.getElementById('userPassword').value
                })
            });

            const data = await response.json();
            document.getElementById('userResult').innerText =
                response.ok ? `Usuário criado: ${data.name}` : JSON.stringify(data);

            await loadUsers();
        }

        async function updateUser() {
            const userId = document.getElementById("editUserId").value;

            const response = await fetch(`/users/${userId}`, {
                method: "PATCH",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    name: document.getElementById("editUserName").value,
                    email: document.getElementById("editUserEmail").value,
                    password: document.getElementById("editUserPassword").value
                })
            });

            const data = await response.json();

            document.getElementById("editUserResult").innerText =
                response.ok ? `Usuário atualizado: ${data.name}` : JSON.stringify(data);

            await loadUsers();
        }

        async function createCouple() {
            const response = await fetch('/couples/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('coupleName').value
                })
            });

            const data = await response.json();
            document.getElementById('coupleResult').innerText =
                response.ok ? `Casal criado: ${data.name}` : JSON.stringify(data);

            await loadCouples();
            await loadStats();
        }

        async function createRaffle() {
            const response = await fetch('/raffles/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    couple_id: Number(document.getElementById('raffleCoupleId').value),
                    name: document.getElementById('raffleName').value,
                    description: document.getElementById('raffleDescription').value,
                    icon: "🎲",
                    color: "#ff4f8b",
                    allow_repeat: false,
                    created_by_user_id: Number(document.getElementById('raffleUserId').value)
                })
            });

            const data = await response.json();
            document.getElementById('raffleResult').innerText =
                response.ok ? `Sorteio criado: ${data.name}` : JSON.stringify(data);

            await loadRaffles();
            await loadStats();
        }

        async function updateRaffle() {
            const raffleId = document.getElementById("editRaffleId").value;

            const response = await fetch(`/raffles/${raffleId}`, {
                method: "PATCH",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    name: document.getElementById("editRaffleName").value,
                    description: document.getElementById("editRaffleDescription").value,
                    allow_repeat: document.getElementById("editRaffleAllowRepeat").checked
                })
            });

            const data = await response.json();
            document.getElementById("editRaffleResult").innerText =
                response.ok ? `Sorteio atualizado: ${data.name}` : JSON.stringify(data);

            await loadRaffles();
        }

        async function deleteRaffle() {
            if (!confirm("Tem certeza que deseja excluir este sorteio e todos os itens dele?")) return;

            const raffleId = document.getElementById("editRaffleId").value;

            const response = await fetch(`/raffles/${raffleId}`, {
                method: "DELETE"
            });

            const data = await response.json();
            document.getElementById("editRaffleResult").innerText = data.mensagem || JSON.stringify(data);

            await loadRaffles();
            await loadItemsPanel();
            await loadStats();
        }

        async function createItem() {
            const response = await fetch('/items/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    raffle_id: Number(document.getElementById('itemRaffleId').value),
                    title: document.getElementById('itemTitle').value,
                    description: document.getElementById('itemDescription').value,
                    is_secret: false,
                    created_by_user_id: Number(document.getElementById('itemUserId').value)
                })
            });

            const data = await response.json();
            document.getElementById('itemResult').innerText =
                response.ok ? `Item adicionado: ${data.title}` : JSON.stringify(data);

            await loadItemsPanel();
            await loadStats();
        }

        async function updateItem(itemId) {
            const response = await fetch(`/items/${itemId}`, {
                method: "PATCH",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    title: document.getElementById(`title-${itemId}`).value,
                    description: document.getElementById(`desc-${itemId}`).value
                })
            });

            await response.json();
            await loadItemsPanel();
        }

        async function completeItem(itemId) {
            const rating = prompt("Nota de 1 a 5:");
            const comment = prompt("Comentário:");

            const response = await fetch(`/items/${itemId}/complete`, {
                method: "PATCH",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    rating: Number(rating),
                    comment: comment
                })
            });

            await response.json();
            await loadItemsPanel();
            await loadStats();
            await loadPoints();
            await loadAchievements();
        }

        async function undoCompleteItem(itemId) {
            const response = await fetch(`/items/${itemId}/undo-complete`, {
                method: "PATCH"
            });

            await response.json();
            await loadItemsPanel();
            await loadStats();
        }

        async function deleteItem(itemId) {
            if (!confirm("Tem certeza que deseja excluir este item?")) return;

            const response = await fetch(`/items/${itemId}`, {
                method: "DELETE"
            });

            await response.json();
            await loadItemsPanel();
            await loadStats();
        }

        async function drawItem() {
            const raffleId = document.getElementById('drawRaffleId').value;
            const userId = document.getElementById('drawUserId').value;

            document.getElementById('drawResult').innerHTML = "Sorteando... 🎲";

            const response = await fetch(`/draws/${raffleId}?user_id=${userId}`, {
                method: 'POST'
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('drawResult').innerHTML = `
                    <h3>🎉 Sorteado!</h3>
                    <p><strong>${data.sorteado.title}</strong></p>
                    <p>${data.sorteado.description || ""}</p>
                `;
            } else {
                document.getElementById('drawResult').innerText = data.detail || JSON.stringify(data);
            }

            await loadItemsPanel();
            await loadStats();
            await loadPoints();
            await loadAchievements();
        }

        async function resetDraw() {
            const raffleId = document.getElementById('resetRaffleId').value;

            const response = await fetch(`/draws/${raffleId}/reset`, {
                method: 'POST'
            });

            const data = await response.json();
            document.getElementById('resetResult').innerText = data.mensagem || JSON.stringify(data);

            await loadItemsPanel();
            await loadStats();
        }

        async function loadPoints() {
            const coupleId = document.getElementById("pointsCoupleId")?.value;

            if (!coupleId) return;

            const response = await fetch(`/achievements/points/couple/${coupleId}`);
            const data = await response.json();

            document.getElementById("pointsBox").innerHTML = `
                <h3>${data.total_points} pontos</h3>
                <p>Total acumulado do casal.</p>
            `;
        }

        async function loadAchievements() {
            const coupleId = document.getElementById("achievementsCoupleId")?.value;

            if (!coupleId) return;

            const response = await fetch(`/achievements/couple/${coupleId}`);
            const achievements = await response.json();

            if (!achievements.length) {
                document.getElementById("achievementsBox").innerHTML = "<p>Nenhuma conquista desbloqueada ainda.</p>";
                return;
            }

            document.getElementById("achievementsBox").innerHTML = achievements.map(a => `
                <div class="mini-card achievement">
                    <strong>🏆 ${a.title}</strong>
                    <p>${a.description || ""}</p>
                </div>
            `).join("");
        }

        async function uploadMemoryPhoto() {
            const fileInput = document.getElementById("memoryPhotoFile");

            if (!fileInput.files.length) {
                document.getElementById("uploadResult").innerText = "Selecione uma foto primeiro.";
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            const response = await fetch("/uploads/photo", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            uploadedMemoryPhotoUrl = data.url;
            document.getElementById("memoryPhotoUrl").value = data.url;
            document.getElementById("uploadResult").innerText = "Foto enviada com sucesso!";
        }

        async function createMemory() {
            const response = await fetch('/memories/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    couple_id: Number(document.getElementById('memoryCoupleId').value),
                    title: document.getElementById('memoryTitle').value,
                    description: document.getElementById('memoryDescription').value,
                    photo_url: uploadedMemoryPhotoUrl || document.getElementById('memoryPhotoUrl').value,
                    place_name: document.getElementById('memoryPlaceName').value,
                    latitude: Number(document.getElementById('memoryLatitude').value) || null,
                    longitude: Number(document.getElementById('memoryLongitude').value) || null,
                    rating: Number(document.getElementById('memoryRating').value) || null,
                    created_by_user_id: Number(document.getElementById('memoryUserId').value)
                })
            });

            const data = await response.json();

            document.getElementById('memoryResult').innerText =
                response.ok ? `Memória salva: ${data.title}` : JSON.stringify(data);

            uploadedMemoryPhotoUrl = "";

            await loadPoints();
            await loadAchievements();
            await loadMemories();
        }

        async function loadMemories() {
            const coupleId = document.getElementById("memoryCoupleId")?.value;

            if (!coupleId) return;

            const response = await fetch(`/memories/couple/${coupleId}`);
            const memories = await response.json();

            if (!memories.length) {
                document.getElementById("memoriesBox").innerHTML = "<p>Nenhuma memória salva ainda.</p>";
                return;
            }

            document.getElementById("memoriesBox").innerHTML = memories.map(m => `
                <div class="memory-card">
                    <h3>${m.title}</h3>
                    <p>${m.description || ""}</p>
                    ${m.photo_url ? `<img src="${m.photo_url}" class="memory-photo">` : ""}
                    <p><strong>Lugar:</strong> ${m.place_name || "Não informado"}</p>
                    <p><strong>Nota:</strong> ${m.rating || "Sem nota"}</p>
                    ${m.latitude && m.longitude ? `
                        <a target="_blank" href="https://www.google.com/maps?q=${m.latitude},${m.longitude}">
                            Ver no mapa
                        </a>
                    ` : ""}
                </div>
            `).join("");
        }

        async function loadHistory() {
            const coupleId = document.getElementById("historyCoupleId")?.value;

            if (!coupleId) return;

            const response = await fetch(`/draws/history-detailed/couple/${coupleId}`);
            const history = await response.json();

            if (!history.length) {
                document.getElementById("historyBox").innerHTML = "<p>Nenhum sorteio realizado ainda.</p>";
                return;
            }

            document.getElementById("historyBox").innerHTML = history.map(h => `
                <div class="mini-card">
                    <strong>${h.raffle_name}</strong>
                    <p>🎲 ${h.item_title}</p>
                    <p>${h.item_description || ""}</p>
                    <p>Data: ${new Date(h.drawn_at).toLocaleString()}</p>
                </div>
            `).join("");
        }
    </script>
</body>
</html>
